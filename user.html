 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Detection AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">OncoDetect AI</div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Early Detection Saves Lives</h1>
            <p>Upload a scan or enter symptoms for rapid AI-based screening.</p>
        </section>

        <section class="upload-container">
            <div class="card">
                <h2>Diagnostic Input</h2>
                <form id="prediction-form">
                    <div class="input-group">
                        <label for="image-upload">Upload Medical Image (CT/MRI/X-Ray):</label>
                        <input type="file" id="image-upload" accept="image/*">
                    </div>
                    <div class="input-group">
                        <label for="patient-age">Patient Age:</label>
                        <input type="number" id="patient-age" placeholder="e.g. 45">
                    </div>
                    <button type="submit" class="btn-predict">Analyze Results</button>
                </form>
            </div>

            <!-- Result Placeholder -->
            <div id="result-section" class="card result-card hidden">
                <h3>Analysis Result</h3>
                <div class="status-indicator"></div>
                <p id="prediction-text">Prediction: <span id="output">--</span></p>
                <p id="confidence-text">Confidence Level: <span id="accuracy">--</span>%</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 OncoDetect AI Project. Professional Medical Use Only.</p>
    </footer>
</body>
</html>
